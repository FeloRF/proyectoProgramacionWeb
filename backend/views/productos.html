<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Alta de Productos</title>
    <link rel="stylesheet" href="../../assets/css/estilos.css">
</head>
<body>
    <h1>Formulario de Alta de Productos</h1>
    <form>
        <label for="id">ID de Producto:</label><br>
        <input type="number" id="id" name="id" required><br><br>

        <label for="nombre">Nombre del Producto:</label><br>
        <input type="text" id="nombre" name="nombre" required><br><br>

        <label for="imagen">URL de Imagen:</label><br>
        <input type="text" id="imagen" name="imagen"><br><br>

        <label for="descripcion">Descripción:</label><br>
        <textarea id="descripcion" name="descripcion" rows="4" cols="50"></textarea><br><br>

        <label for="precio">Precio:</label><br>
        <input type="number" id="precio" name="precio" step="0.01" required><br><br>

        <label for="categoria">ID Categoría:</label><br>
        <input type="number" id="categoria" name="categoria" required><br><br>

        <button type="submit">Guardar</button>
        <button type="reset">Cancelar</button>
    </form>

    <p style="text-align: center; margin-top: 20px;">Felipe Rojas</p>
</body>
</html>
